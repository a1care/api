name: Deploy to AWS EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'a1care backend/**'
      - 'docker-compose.yml'
      - 'nginx/**'
      - 'package.json'
      - 'tsconfig.json'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the project directory
            cd ~/api-main
            
            # Pull the latest changes from GitHub
            git pull origin main
            
            # Build and restart containers using Docker Compose
            docker compose up -d --build
            
            # --- RAM & DISK SAVING OPS ---
            # Remove stopped containers, unused networks, and dangling images
            docker system prune -f
            
            # Specifically remove all unused images (not just dangling ones) to save more space
            # This is safe because 'docker compose up' just created/started the needed ones
            docker image prune -a -f
            
            # Optional: Clear build cache to save disk space
            docker builder prune -f
            
            echo "Deployment complete and cleanup finished."
