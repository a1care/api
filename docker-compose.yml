services:
  api:
    build:
      context: ./a1care backend
      dockerfile: Dockerfile
    container_name: a1care-api
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - ./a1care backend/.env
    depends_on:
      - redis
    networks:
      - a1care-network

  redis:
    image: redis:alpine
    container_name: a1care-redis
    restart: always
    networks:
      - a1care-network

  nginx:
    image: nginx:1.25-alpine
    container_name: a1care-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - api
    networks:
      - a1care-network
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    container_name: a1care-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  a1care-network:
    driver: bridge
